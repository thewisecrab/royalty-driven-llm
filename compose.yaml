services:
  rdllm:
    build:
      context: .
      dockerfile: Dockerfile
    image: rdllm:local
    environment:
      RDLLM_SERVICE_TOKEN_SHA256: ${RDLLM_SERVICE_TOKEN_SHA256:?set RDLLM_SERVICE_TOKEN_SHA256}
    ports:
      - "8765:8765"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - rdllm_audit:/var/lib/rdllm/audit
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8765/readyz', timeout=3); raise SystemExit(0 if json.load(r).get('status') == 'ready' else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rdllm_audit:

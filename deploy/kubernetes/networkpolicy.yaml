apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rdllm-service-ingress
  labels:
    app.kubernetes.io/name: rdllm
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rdllm
      app.kubernetes.io/component: service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              rdllm.network/access: "true"
      ports:
        - protocol: TCP
          port: 8765

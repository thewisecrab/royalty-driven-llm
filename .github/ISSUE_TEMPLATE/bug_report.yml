name: Bug report
description: Report incorrect behavior in RDLLM code, artifacts, docs, or verifiers.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and expected fail-closed behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, inputs, artifacts, and relevant hashes.
      value: |
        ```bash
        PYTHONPATH=src python tools/ship_check.py
        ```
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Attribution/source footer
        - Provider adapter
        - Provider response state
        - Provider meter/settlement
        - Certification/reporting
        - Documentation/hosting
        - Packaging/CI
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste relevant verifier output, stack traces, or artifact snippets. Do not include secrets or private source text.
    validations:
      required: false

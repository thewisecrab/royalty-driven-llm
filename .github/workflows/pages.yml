name: Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "examples/live_use_cases/**"
      - "examples/api_clients/**"
      - "paper/rdllm_white_paper.md"
      - "paper/arxiv/rdllm_white_paper.pdf"
      - "tools/build_public_site.py"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Build and audit public site
        run: |
          python -m pip install -e ".[dev]"
          python tools/build_public_site.py --output _site

      - name: Upload public site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests

      - name: Audit installed dependencies
        run: |
          python -m pip_audit

      - name: Run shipping checks
        run: |
          PYTHONPATH=src python tools/ship_check.py --skip-tests --skip-regenerate

  full-release-check:
    name: Full release check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run full ship check
        run: |
          PYTHONPATH=src python tools/ship_check.py
